server:
  port: 8080

spring:
  application:
    name: zhiyan-kb-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/zhiyan_kb_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

zhiyan:
  demo-accounts-enabled: ${ZHIYAN_DEMO_ACCOUNTS_ENABLED:false}
  ai:
    mode: ${ZHIYAN_AI_MODE:mock}
    provider: deepseek
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    chat-model: ${DEEPSEEK_CHAT_MODEL:deepseek-v4-flash}
    temperature: ${DEEPSEEK_TEMPERATURE:0.3}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:1600}
    connect-timeout-millis: ${DEEPSEEK_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${DEEPSEEK_READ_TIMEOUT_MILLIS:30000}
    max-retries: ${DEEPSEEK_MAX_RETRIES:2}
  upload-dir: uploads
  cors:
    allowed-origins: ${ZHIYAN_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    token-expire-hours: 2
  memory:
    ttl-minutes: 120
    window-size: 6
  rag:
    alpha: 0.5
    min-score: 0.08

logging:
  level:
    com.zhiyan.kb: info
