services:
  mysql:
    image: mysql:8.0
    container_name: zhiyan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: zhiyan_kb_agent
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/init_data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
  redis:
    image: redis:7
    container_name: zhiyan-redis
    ports:
      - "6379:6379"
